name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate tag ancestry from the default branch
        env:
          RELEASE_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          GIT_CONFIG_COUNT: "2"
          GIT_CONFIG_KEY_0: credential.helper
          GIT_CONFIG_VALUE_0: ""
          GIT_CONFIG_KEY_1: credential.helper
          GIT_CONFIG_VALUE_1: "!f() { echo username=x-access-token; echo password=$GH_TOKEN; }; f"
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/heads/$RELEASE_BRANCH:refs/remotes/origin/$RELEASE_BRANCH"
          if ! git merge-base --is-ancestor "${GITHUB_SHA}^{commit}" "refs/remotes/origin/$RELEASE_BRANCH"; then
            echo "::error::Tagged commit is not reachable from origin/$RELEASE_BRANCH"
            exit 1
          fi

      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2.0.0

      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: "0.11.19"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install locked dev environment
        run: uv sync --locked --group dev --group docs

      - name: Validate lockfile
        run: uv lock --check

      - name: Validate version against tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          RUNTIME_VERSION=$(uv run python -c "import diffguard; print(diffguard.__version__)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          if [ "$PKG_VERSION" != "$RUNTIME_VERSION" ]; then
            echo "::error::pyproject.toml version ($PKG_VERSION) does not match diffguard.__version__ ($RUNTIME_VERSION)"
            exit 1
          fi
          echo "Version validated across tag, package metadata, and runtime: $PKG_VERSION"

      - name: Run canonical validation
        run: |
          just ci
          just validate-corpus
          just docs-build
        timeout-minutes: 5

      - name: Build package
        run: just build

      - name: Verify built wheel and sdist in isolation
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          if [ "${#wheels[@]}" -ne 1 ] || [ ! -f "${wheels[0]}" ]; then
            echo "::error::Expected exactly one built wheel"
            exit 1
          fi
          if [ "${#sdists[@]}" -ne 1 ] || [ ! -f "${sdists[0]}" ]; then
            echo "::error::Expected exactly one built sdist"
            exit 1
          fi
          verify_dir="$(mktemp -d)"
          trap 'rm -rf "$verify_dir"' EXIT
          uv run python -m venv "$verify_dir/wheel-venv"
          uv run python -m venv "$verify_dir/sdist-venv"
          "$verify_dir/wheel-venv/bin/python" -m pip install --no-cache-dir "${wheels[0]}"
          "$verify_dir/sdist-venv/bin/python" -m pip install --no-cache-dir "${sdists[0]}"
          test "$("$verify_dir/wheel-venv/bin/diffguard" --version)" = "diffguard, version $version"
          test "$("$verify_dir/sdist-venv/bin/diffguard" --version)" = "diffguard, version $version"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  test-minimum:
    name: Validate minimum Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: "0.11.19"

      - name: Install locked dev environment
        run: uv sync --locked --group dev --group docs

      - name: Run minimum-version validation
        run: |
          uv lock --check
          just ci
          just validate-corpus

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: [build, test-minimum]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Set up pinned uv for trusted publishing
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: "0.11.19"

      - name: Publish to TestPyPI
        run: uv publish --trusted-publishing always --publish-url https://test.pypi.org/legacy/ dist/*

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build, test-minimum]  # TestPyPI is optional; don't block production publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Set up pinned uv for trusted publishing
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: "0.11.19"

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*

  smoke-test:
    name: Smoke Test
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install and verify
        run: |
          sleep 30  # allow PyPI index to propagate
          VERSION="${GITHUB_REF_NAME#v}"
          pip install "diffguard==$VERSION"
          diffguard --version
